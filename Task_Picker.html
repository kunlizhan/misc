<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Task Picker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .task-card {
            transition: all 0.3s ease;
        }
        .task-card:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-10 px-4">

    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">Task Picker</h1>
            <p class="text-gray-600">Randomly select your daily focus</p>
        </div>

        <!-- Input Section -->
        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Add New Task</h2>
            <div class="flex flex-col gap-4">
                <input type="text" id="taskInput" placeholder="Enter task name..." 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                
                <div class="flex items-center gap-6">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" id="highPriorityCheck" class="w-4 h-4 text-red-600 border-gray-300 rounded focus:ring-red-500">
                        <span class="ml-2 text-sm font-medium text-gray-700">High Priority</span>
                    </label>
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" id="lowPriorityCheck" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                        <span class="ml-2 text-sm font-medium text-gray-700">Low Priority</span>
                    </label>
                </div>

                <button onclick="addTask()" class="w-full bg-gray-800 text-white font-bold py-2 rounded-lg hover:bg-gray-700 transition duration-200">
                    Add to List
                </button>
            </div>
        </div>

        <!-- Generator Action -->
        <div class="mb-8 text-center">
            <button onclick="generateRandomTasks()" class="w-full bg-blue-600 text-white text-xl font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transform active:scale-95 transition duration-150">
                🚀 Generate Random Tasks
            </button>
        </div>

        <!-- Results Section (Hidden by default) -->
        <div id="resultsContainer" class="hidden mb-8 animate-fade-in">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">Your Selected Tasks</h2>
            <div class="grid grid-cols-1 gap-4" id="resultsList">
                <!-- Results will be injected here -->
            </div>
        </div>

        <!-- Task List Management -->
        <div class="bg-white p-6 rounded-xl shadow-md">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-gray-700">Your Task Library</h2>
                <span id="taskCount" class="text-sm text-gray-50-gray-500 bg-gray-100 px-2 py-1 rounded">0 tasks</span>
            </div>
            <ul id="taskList" class="divide-y divide-gray-200">
                <!-- Tasks will be injected here -->
            </ul>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        // Initialize app
        updateUI();

        function addTask() {
            const text = document.getElementById('taskInput').value.trim();
            const isHigh = document.getElementById('highPriorityCheck').checked;
            const isLow = document.getElementById('lowPriorityCheck').checked;

            if (!text) {
                alert("Please enter a task name.");
                return;
            }

            if (!isHigh && !isLow) {
                alert("Please select at least one priority level.");
                return;
            }

            const newTask = {
                id: Date.now(),
                text: text,
                tags: []
            };

            if (isHigh) newTask.tags.push('high-priority');
            if (isLow) newTask.tags.push('low-priority');

            tasks.push(newTask);
            saveAndRefresh();
            
            // Reset inputs
            document.getElementById('taskInput').value = '';
            document.getElementById('highPriorityCheck').checked = false;
            document.getElementById('lowPriorityCheck').checked = false;
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            updateUI();
        }

        function updateUI() {
            const taskList = document.getElementById('taskList');
            const taskCount = document.getElementById('taskCount');
            
            taskList.innerHTML = '';
            taskCount.innerText = `${tasks.length} tasks`;

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = 'py-3 flex justify-between items-center group';
                
                const tagHtml = task.tags.map(tag => 
                    `<span class="text-[10px] uppercase font-bold px-2 py-0.5 rounded-full mr-2 ${tag === 'high-priority' ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600'}">
                        ${tag.split('-')[0]}
                    </span>`
                ).join('');

                li.innerHTML = `
                    <div class="flex items-center">
                        ${tagHtml}
                        <span class="text-gray-700 font-medium">${task.text}</span>
                    </div>
                    <button onclick="deleteTask(${task.id})" class="text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-opacity">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                        </svg>
                    </button>
                `;
                taskList.appendChild(li);
            });
        }

        function getRandomItems(arr, count) {
            const shuffled = [...arr].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        }

        function generateRandomTasks() {
            const highPool = tasks.filter(t => t.tags.includes('high-priority'));
            const lowPool = tasks.filter(t => t.tags.includes('low-priority'));

            if (highPool.length < 2 || lowPool.length < 3) {
                alert(`Not enough tasks! \nNeed: 2 High, 3 Low. \nCurrent: ${highPool.length} High, ${lowPool.length} Low.`);
                return;
            }

            const selectedHigh = getRandomItems(highPool, 2);
            const selectedLow = getRandomItems(lowPool, 3);
            const allSelected = [...selectedHigh, ...selectedLow];

            const resultsContainer = document.getElementById('resultsContainer');
            const resultsList = document.getElementById('resultsList');
            
            resultsList.innerHTML = '';
            resultsContainer.classList.remove('hidden');

            allSelected.forEach(task => {
                const isHigh = task.tags.includes('high-priority');
                const card = document.createElement('div');
                card.className = `task-card p-4 rounded-lg border-l-4 bg-white shadow-sm flex justify-between items-center ${isHigh ? 'border-red-500' : 'border-blue-500'}`;
                
                card.innerHTML = `
                    <span class="font-semibold text-gray-800">${task.text}</span>
                    <span class="text-xs font-bold uppercase ${isHigh ? 'text-red-500' : 'text-blue-500'}">
                        ${isHigh ? 'High' : 'Low'}
                    </span>
                `;
                resultsList.appendChild(card);
            });

            // Smooth scroll to results
            resultsContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
    </html>
